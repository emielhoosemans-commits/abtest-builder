<style>
  :root {
    /* Etos & Gall palette – inspired by the logo */
    --coral: #ff6b4a;           /* logo coral/orange */
    --coral-soft: #ff8a6a;
    --coral-deep: #e04f30;
    --rose: #ffb3c1;            /* logo pink */
    --ink: #0a0b10;             /* primary bg */
    --ink-2: #101117;
    --ink-3: #181a22;
    --ink-4: #22252f;
    --line: #24272f;
    --line-soft: #1a1c23;
    --text: #e8e6e1;
    --text-soft: #8a8b8f;
    --text-mute: #4d4f57;
    --text-faint: #2f313a;
    --mint: #7ae0b8;            /* accent */
    --amber: #f5b84c;
    --lilac: #b08cff;

    --radius: 10px;
    --radius-sm: 6px;
    --font-display: 'Instrument Serif', 'Iowan Old Style', Georgia, serif;
    --font-body: 'Geist', 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; }

  html, body, #root {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--font-body);
    background: var(--ink);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  /* subtle film-grain background */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  button { font-family: inherit; }
  textarea, input { font-family: inherit; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2d36; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #393c47; }

  /* Utility classes used by the app */
  .mono { font-family: var(--font-mono); }
  .serif { font-family: var(--font-display); }

  .label-eyebrow {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mute);
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 7px;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--text-soft);
    background: var(--ink-2);
  }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    padding: 8px 13px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--ink-3);
    color: var(--text);
  }
  .btn:hover:not(:disabled) { background: #252833; border-color: var(--line); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-primary {
    background: var(--coral);
    color: #1a0a05;
    font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--coral-soft);
    border-color: transparent;
  }
  .btn-primary:disabled { background: #1e1f26; color: var(--text-faint); }

  .btn-ghost {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { background: var(--ink-3); color: var(--text); }

  /* animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .fade-in { animation: fadeInUp 0.25s ease forwards; }
  .loading-dot { animation: pulse 1.2s ease-in-out infinite; }

  /* focus */
  textarea:focus, input:focus {
    outline: none;
    border-color: var(--coral) !important;
    box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.12);
  }
</style>

The user will describe design changes they want to test on a webpage. Your job is to:

2. Generate precise CSS and JavaScript changes as separate "factors" for SiteSpect
3. For each change, suggest the most appropriate SiteSpect trigger

Respond ONLY with a valid JSON object in this exact structure:

  "factors": [
    {
      "id": "unique_snake_case_id",
      "name": "Human readable factor name",
      "type": "css" | "html" | "attribute" | "js",
      "selector": "CSS selector string",
      "changes": [
        {
          "property": "CSS property or attribute name",
          "value": "new value",
          "changeType": "set_css" | "insert_html" | "set_attribute" | "custom_js"
        }
      ],
      "trigger": {
        "type": "path" | "query" | "hash" | "custom_js",
        "value": "trigger value or JS code",
        "rationale": "Why this trigger was chosen"
      },
      "sitespect_instructions": "Step-by-step instructions for entering this in SiteSpect UI"
    }
  ]
}

Rules:
- Split CSS changes and JS/HTML changes into SEPARATE factors
- Each factor = one Variation in SiteSpect with a specific CSS selector
- Prefer path triggers for page-level changes, query triggers for parameter-based pages
- Use custom_js triggers for SPA or dynamic content
- Be specific with CSS selectors based on the actual HTML provided

- For HTML changes: use insert_html type with full HTML string

/* ─── Utilities ─── */
const VAR_COLORS = ["#ff6b4a", "#7ae0b8", "#f5b84c", "#b08cff", "#5ac8ea", "#ff8fab"];

function uid() { return Math.random().toString(36).slice(2, 8); }

function applyFactorsToDoc(doc, factors) {
  factors.forEach((factor) => {
    try {
      const els = doc.querySelectorAll(factor.selector);
      els.forEach((el) => {
        factor.changes?.forEach((change) => {
          if (change.changeType === "set_css") el.style[change.property] = change.value;
          else if (change.changeType === "insert_html") el.innerHTML = change.value;
          else if (change.changeType === "set_attribute") el.setAttribute(change.property, change.value);
          else if (change.changeType === "custom_js") {
            try { (new Function("el", change.value))(el); } catch (e) {}
          }
        });
      });
    } catch (e) {}
  });
}

function generateExport(variation, pagePath = "/") {
  const jsSnippet = `// ============================================================
// SiteSpect Client-Side Variation Export
// Variation: ${variation.name}
// Generated: ${new Date().toISOString()}
// Trigger Path: ${pagePath}
// ============================================================

(function() {
  'use strict';

  var factors = ${JSON.stringify(
    variation.factors.map((f) => ({ id: f.id, name: f.name, selector: f.selector, changes: f.changes })),
    null, 2
  )};

  function applyFactor(factor) {
    var els = document.querySelectorAll(factor.selector);
    if (!els.length) return;
    els.forEach(function(el) {
      factor.changes.forEach(function(change) {
        switch (change.changeType) {
          case 'set_css': el.style[change.property] = change.value; break;
          case 'insert_html': el.innerHTML = change.value; break;
          case 'set_attribute': el.setAttribute(change.property, change.value); break;
          case 'custom_js': try { (new Function('el', change.value))(el); } catch(e) {} break;
        }
      });
    });
  }

  function applyAll() { factors.forEach(applyFactor); }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyAll);
  } else { applyAll(); }

  var obs = new MutationObserver(applyAll);
  obs.observe(document.documentElement, { childList: true, subtree: true });
})();`;

  const jsonManifest = {
    variation: variation.name,
    exported_at: new Date().toISOString(),
    page_path: pagePath,
    factors: variation.factors.map((f) => ({
      factor_name: f.name,
      sitespect_type: "Client Side",
      selector: f.selector,
      trigger: f.trigger,
      changes: f.changes,
      sitespect_instructions: f.sitespect_instructions,
    })),
  };

  return { jsSnippet, jsonManifest };
}

/* ─── DeviceToggle ─── */
function DeviceToggle({ device, onChange }) {
  const items = [
    { id: "desktop", label: "Desktop", icon: <Icon.desktop /> },
    { id: "mobile", label: "Mobile", icon: <Icon.mobile /> },
  ];
  return (
    <div style={{
      display: "flex", gap: "2px",
      background: "var(--ink-2)",
      borderRadius: "8px",
      padding: "3px",
      border: "1px solid var(--line)",
    }}>
      {items.map((d) => {
        const active = device === d.id;
        return (
          <button key={d.id} onClick={() => onChange(d.id)} style={{
            display: "flex", alignItems: "center", gap: "6px",
            padding: "5px 11px",
            borderRadius: "6px", border: "none", cursor: "pointer",
            fontSize: "11.5px", fontWeight: 500,
            background: active ? "var(--ink-4)" : "transparent",
            color: active ? "var(--text)" : "var(--text-mute)",
            transition: "all 0.15s",
          }}>
            {d.icon} {d.label}
          </button>
        );
      })}
    </div>
  );
}

/* ─── FactorCard ─── */
function FactorCard({ factor, onRemove }) {
  const [open, setOpen] = useState(false);
  const typeColor = {
    css: "var(--mint)",
    html: "var(--coral)",
    js: "var(--amber)",
    attribute: "var(--lilac)",
  }[factor.type] || "var(--text-mute)";

  const triggerLabel = { path: "Path", query: "Query", hash: "Hash", custom_js: "Custom JS" }[factor.trigger?.type] || "Path";

  return (
    <div style={{
      background: "var(--ink-2)",
      border: "1px solid var(--line)",
      borderRadius: "8px",
      overflow: "hidden",
      marginBottom: "6px",
    }}>
      <div
        onClick={() => setOpen(!open)}
        style={{ display: "flex", alignItems: "center", gap: "8px", padding: "9px 11px", cursor: "pointer" }}
      >
        <span style={{
          color: typeColor,
          border: `1px solid ${typeColor}55`,
          background: `${typeColor}12`,
          fontSize: "9px", fontWeight: 600, letterSpacing: "0.08em",
          padding: "2px 6px", borderRadius: "4px",
          textTransform: "uppercase", flexShrink: 0,
          fontFamily: "var(--font-mono)",
        }}>{factor.type}</span>
        <span style={{
          flex: 1, fontSize: "12.5px", color: "var(--text)", fontWeight: 400,
          overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
        }}>{factor.name}</span>
        <span className="chip" style={{
          fontSize: "9.5px", padding: "2px 6px",
          color: "var(--text-soft)",
          borderColor: "var(--line)",
        }}>{triggerLabel}</span>
        <button onClick={(e) => { e.stopPropagation(); onRemove(factor.id); }} style={{
          background: "none", border: "none", color: "var(--text-faint)",
          cursor: "pointer", padding: "2px", display: "flex",
        }}>
          <Icon.close />
        </button>
        <Icon.chevron dir={open ? "up" : "down"} />
      </div>
      {open && (

/* ─── ExportModal ─── */
function ExportModal({ variation, onClose }) {
  const [tab, setTab] = useState("js");
  const [copied, setCopied] = useState(false);
  const { jsSnippet, jsonManifest } = generateExport(variation);
  const content = tab === "js" ? jsSnippet : JSON.stringify(jsonManifest, null, 2);
  const copy = () => {
    navigator.clipboard.writeText(content);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  const download = () => {
    const blob = new Blob([content], { type: tab === "js" ? "text/javascript" : "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${variation.name.replace(/\s+/g, "-").toLowerCase()}.${tab === "js" ? "js" : "json"}`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{
      position: "fixed", inset: 0,
      background: "rgba(4, 5, 10, 0.75)",
      backdropFilter: "blur(6px)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 1000, padding: "24px",
    }}
    onClick={onClose}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        className="fade-in"
        style={{
          background: "var(--ink-2)",
          border: "1px solid var(--line)",
          borderRadius: "14px",
          width: "100%", maxWidth: "760px", maxHeight: "82vh",
          display: "flex", flexDirection: "column",
          boxShadow: "0 24px 80px rgba(0,0,0,0.6)",
        }}>
        <div style={{
          display: "flex", alignItems: "center",
          padding: "15px 18px", borderBottom: "1px solid var(--line)",
        }}>
          <div>
            <div className="serif" style={{ fontSize: "22px", fontWeight: 400, color: "var(--text)", lineHeight: 1, fontStyle: "italic" }}>
              Export <span style={{ color: "var(--coral)" }}>—</span> {variation.name}
            </div>
            <div className="label-eyebrow" style={{ marginTop: "5px" }}>
              {variation.factors.length} factor{variation.factors.length !== 1 ? "s" : ""} · SiteSpect Client-Side
            </div>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", gap: "8px", alignItems: "center" }}>
            <div style={{ display: "flex", background: "var(--ink-3)", borderRadius: "7px", padding: "3px" }}>
              {[{ id: "js", label: "JS Snippet" }, { id: "json", label: "JSON Manifest" }].map((t) => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  padding: "5px 11px", borderRadius: "5px", border: "none",
                  background: tab === t.id ? "var(--ink-4)" : "transparent",
                  color: tab === t.id ? "var(--text)" : "var(--text-mute)",
                  fontSize: "11px", fontWeight: 500, cursor: "pointer",
                }}>{t.label}</button>
              ))}
            </div>
            <button className="btn btn-ghost" onClick={download} title="Download file">
              <Icon.download s={12} />
            </button>
            <button className="btn btn-primary" onClick={copy} style={{ background: copied ? "var(--mint)" : "var(--coral)" }}>
              {copied ? "✓ Copied" : "Copy"}
            </button>
            <button className="btn btn-ghost" onClick={onClose} style={{ width: "30px", height: "30px", padding: 0 }}>
              <Icon.close />
            </button>
          </div>
        </div>
        {tab === "js" && (
          <div style={{
            padding: "10px 18px",
            background: "rgba(255, 107, 74, 0.06)",
            borderBottom: "1px solid rgba(255, 107, 74, 0.12)",
          }}>
            <p style={{ margin: 0, fontSize: "11px", color: "var(--coral-soft)", lineHeight: 1.65 }}>
              <strong>SiteSpect setup:</strong> New A/B Campaign → Variations → Find &amp; Replace → Type: <strong>Client Side</strong> → paste into <strong>Custom JavaScript</strong>.
            </p>
          </div>
        )}
        <pre className="mono" style={{
          flex: 1, overflow: "auto", margin: 0,
          padding: "14px 18px",
          fontSize: "11.5px", lineHeight: 1.75,
          color: "#d4e6a8", background: "#070810",
          borderRadius: "0 0 14px 14px",

          {content}
        </pre>

  );
}

/* ─── VariationTabBar ─── */
function VariationTabBar({ variations, activeId, onSelect, onAdd, onRename, onDelete }) {
  const [editingId, setEditingId] = useState(null);
  const [editVal, setEditVal] = useState("");

  const startEdit = (v, e) => {
    if (v.isControl) return;
    e.stopPropagation();
    setEditingId(v.id); setEditVal(v.name);
  };
  const commitEdit = (id) => { if (editVal.trim()) onRename(id, editVal.trim()); setEditingId(null); };

  return (
    <div style={{
      display: "flex", alignItems: "center", gap: "4px",
      padding: "9px 16px",
      borderBottom: "1px solid var(--line)",
      background: "var(--ink-2)",
      overflowX: "auto", flexShrink: 0,
    }}>
      <span className="label-eyebrow" style={{ marginRight: "8px", flexShrink: 0, whiteSpace: "nowrap" }}>
        Preview
      </span>
      {variations.map((v, idx) => {
        const color = v.isControl ? "#6b7280" : VAR_COLORS[(idx - 1) % VAR_COLORS.length];
        const isActive = v.id === activeId;
        return (
          <div
            key={v.id}
            onClick={() => onSelect(v.id)}
            style={{
              display: "flex", alignItems: "center", gap: "7px",
              padding: "5px 11px", borderRadius: "8px",
              cursor: "pointer", flexShrink: 0,
              background: isActive ? `${color}18` : "transparent",
              border: `1px solid ${isActive ? `${color}55` : "var(--line-soft)"}`,
              transition: "all 0.15s",
            }}
          >
            <div style={{ width: "7px", height: "7px", borderRadius: "50%", background: color, flexShrink: 0 }} />
            {editingId === v.id ? (
              <input
                autoFocus value={editVal}
                onChange={(e) => setEditVal(e.target.value)}
                onBlur={() => commitEdit(v.id)}
                onKeyDown={(e) => e.key === "Enter" && commitEdit(v.id)}
                onClick={(e) => e.stopPropagation()}
                style={{
                  background: "transparent", border: "none", outline: "none",
                  color: "var(--text)", fontSize: "12px", fontWeight: 500, width: "90px",
                }}
              />
            ) : (
              <span
                onDoubleClick={(e) => startEdit(v, e)}
                title={v.isControl ? "Control — original" : "Double-click to rename"}
                style={{
                  fontSize: "12px", fontWeight: 500,
                  color: isActive ? "var(--text)" : "var(--text-soft)",
                  userSelect: "none", whiteSpace: "nowrap",
                }}
              >
                {v.name}
              </span>
            )}
            {v.factors.length > 0 && (
              <span className="mono" style={{
                fontSize: "9.5px", color,
                background: `${color}20`, padding: "1px 5px", borderRadius: "3px",
                fontWeight: 500,
              }}>{v.factors.length}</span>
            )}
            {!v.isControl && variations.filter(x => !x.isControl).length > 1 && (
              <button
                onClick={(e) => { e.stopPropagation(); onDelete(v.id); }}
                style={{
                  background: "none", border: "none",
                  color: "var(--text-faint)", cursor: "pointer",
                  padding: 0, display: "flex", lineHeight: 1,
                }}
              >
                <Icon.close s={10} />
              </button>
            )}
          </div>
        );
      })}
      <button
        onClick={onAdd}
        style={{
          display: "flex", alignItems: "center", gap: "5px",
          padding: "5px 10px", borderRadius: "8px",
          border: "1px dashed var(--line)", background: "transparent",
          color: "var(--text-soft)", cursor: "pointer", fontSize: "11.5px",
          flexShrink: 0, transition: "all 0.15s", fontFamily: "inherit",
        }}
        onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--coral)"; e.currentTarget.style.color = "var(--coral)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line)"; e.currentTarget.style.color = "var(--text-soft)"; }}
      >
        <Icon.plus s={11} />
        Add variation
      </button>
    </div>
  );
}

/* ─── Main App ─── */
function ABTestBuilder() {
  const [device, setDevice] = useState("desktop");
  const [htmlSource, setHtmlSource] = useState("");
  const [variations, setVariations] = useState([makeControl(), makeVariation(1)]);
  const [activeVarId, setActiveVarId] = useState("control");
  const [promptText, setPromptText] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeCodeTab, setActiveCodeTab] = useState("html");
  const [showExport, setShowExport] = useState(false);
  const [previewKey, setPreviewKey] = useState(0);
  const fileInputRef = useRef(null);
  const iframeRef = useRef(null);
  const chatEndRef = useRef(null);

  const activeVar = variations.find((v) => v.id === activeVarId) || variations[0];
  const varCount = variations.filter((v) => !v.isControl).length;

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [activeVar.messages]);

  useEffect(() => {
    const iframe = iframeRef.current;
    if (!iframe || !htmlSource) return;
    const inject = () => {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;
        if (doc) applyFactorsToDoc(doc, activeVar.factors);
      } catch (e) {}
    };
    iframe.onload = inject;
    const t = setTimeout(inject, 100);
    return () => clearTimeout(t);
  }, [activeVar.factors, previewKey, activeVarId, htmlSource]);

  const updateVar = (id, fn) => setVariations((prev) => prev.map((v) => v.id === id ? { ...v, ...fn(v) } : v));

  const handleFileUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setHtmlSource(ev.target.result);
      setPreviewKey((k) => k + 1);
      setVariations((prev) => prev.map((v) => ({
        ...v,
        messages: [...v.messages, { role: "system", text: `✓ Loaded "${file.name}" (${(file.size / 1024).toFixed(1)} KB)` }]
      })));
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const loadDemoPage = () => {
    const demo = `<!DOCTYPE html><html><head><title>Etos · Skincare Sale</title>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; color: #1a1a1a; background: #fafaf7; }
  .hero { background: linear-gradient(135deg, #ffe0d4 0%, #ffd1dc 100%); padding: 60px 40px; text-align: center; }
  .hero h1 { font-size: 42px; margin: 0 0 12px; font-weight: 600; }
  .hero p { font-size: 17px; color: #555; max-width: 520px; margin: 0 auto 24px; line-height: 1.55; }
  .cta { background: #1a1a1a; color: white; padding: 14px 32px; border: none; font-size: 15px; border-radius: 6px; cursor: pointer; font-weight: 500; }
  .products { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 48px 40px; max-width: 1100px; margin: 0 auto; }
  .product { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  .product h3 { margin: 0 0 6px; font-size: 17px; }
  .product .price { color: #e04f30; font-weight: 600; font-size: 18px; }
  .product .old-price { color: #999; text-decoration: line-through; font-size: 14px; margin-left: 8px; }
  .badge { background: #7ae0b8; color: #0a0b10; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
  footer { text-align: center; padding: 32px; color: #888; font-size: 13px; }
</style></head>
<body>
<section class="hero">
  <h1>Spring skincare sale</h1>
  <p>Gentle, effective, loved by dermatologists. Shop up to 40% off our bestselling routines this week only.</p>
  <button class="cta" id="hero-cta">Shop the sale</button>
</section>
<section class="products">
  <div class="product"><span class="badge">Best seller</span><h3>Hydrating serum</h3><p>Plumps and smooths in 2 weeks.</p><div><span class="price">€18</span><span class="old-price">€30</span></div></div>
  <div class="product"><span class="badge">New</span><h3>Vitamin C glow drops</h3><p>Brightens dull skin overnight.</p><div><span class="price">€22</span><span class="old-price">€35</span></div></div>
  <div class="product"><span class="badge">-40%</span><h3>Overnight repair cream</h3><p>Wake up with visibly firmer skin.</p><div><span class="price">€24</span><span class="old-price">€40</span></div></div>
</section>
<footer>Etos · Gall &amp; Gall demo page · For prototype use only</footer>
</body></html>`;
    setHtmlSource(demo);
    setPreviewKey((k) => k + 1);
    setVariations((prev) => prev.map((v) => ({
      ...v,
      messages: [...v.messages, { role: "system", text: "✓ Loaded demo page — try: \"Change the hero button to coral and add a countdown timer\"" }]
    })));
  };

  const handlePrompt = async () => {
    if (!promptText.trim() || activeVar.isControl || !htmlSource) return;
    const userMsg = { role: "user", text: promptText };
    updateVar(activeVarId, (v) => ({ messages: [...v.messages, userMsg] }));
    const currentPrompt = promptText;
    setPromptText("");
    setLoading(true);

    const truncatedHTML = htmlSource.slice(0, 8000);
    const history = activeVar.messages
      .filter((m) => m.role === "user" || m.role === "assistant_raw")
      .map((m) => ({ role: m.role === "assistant_raw" ? "assistant" : "user", content: m.text }));

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [
            ...history,
            { role: "user", content: `Page HTML:\n\`\`\`html\n${truncatedHTML}\n\`\`\`\n\nRequest: ${currentPrompt}` },
          ],
        }),
      });
      const data = await res.json();
      const raw = data.content?.map((b) => b.text || "").join("") || "";
      let parsed;
      try {
        const m = raw.match(/\{[\s\S]*\}/);
        parsed = JSON.parse(m?.[0] || raw);
      } catch {
        updateVar(activeVarId, (v) => ({
          messages: [...v.messages, { role: "system", text: "⚠️ Could not parse response." }]
        }));
        setLoading(false);
        return;
      }

      updateVar(activeVarId, (v) => {
        const newFactors = parsed.factors || [];
        const newIds = new Set(newFactors.map((f) => f.id));
        return {
          messages: [
            ...v.messages,
            { role: "assistant", text: parsed.summary || "Changes generated.", factorCount: newFactors.length },
            { role: "assistant_raw", text: raw },
          ],
          factors: [...v.factors.filter((f) => !newIds.has(f.id)), ...newFactors],
        };
      });
      setPreviewKey((k) => k + 1);
    } catch (err) {
      updateVar(activeVarId, (v) => ({
        messages: [...v.messages, { role: "system", text: `⚠️ Error: ${err.message}` }]
      }));
    }
    setLoading(false);
  };

  const addVariation = () => {
    const n = varCount + 1;
    const nv = makeVariation(n);
    setVariations((prev) => [...prev, nv]);
    setActiveVarId(nv.id);
  };

  const codeContent = (() => {
    if (activeCodeTab === "html") return htmlSource || "<!-- No source loaded — import a page or try the demo -->";
    if (activeCodeTab === "css") {
      const cf = activeVar.factors.filter((f) => f.type === "css");
      return cf.length
        ? cf.flatMap((f) => f.changes?.map((c) => `/* ${f.name} */\n${f.selector} { ${c.property}: ${c.value}; }`)).join("\n\n")
        : "/* No CSS changes for this variation */";
    }
    const jf = activeVar.factors.filter((f) => f.type !== "css");
    return jf.length
      ? jf.map((f) => `/* ${f.name} | ${f.selector} */\n// Trigger: ${f.trigger?.type} → ${f.trigger?.value}`).join("\n\n")
      : "// No JS/HTML changes";
  })();

  const activeVarIdx = variations.indexOf(activeVar);
  const activeVarColor = activeVar.isControl ? "#6b7280" : VAR_COLORS[(activeVarIdx - 1) % VAR_COLORS.length];
  const canExport = !activeVar.isControl && activeVar.factors.length > 0;

  return (
    <div style={{
      display: "flex", flexDirection: "column",
      height: "100vh",
      background: "var(--ink)",
      color: "var(--text)",
    }}>
      {/* Top bar */}
      <div style={{
        display: "flex", alignItems: "center",
        padding: "12px 18px",
        borderBottom: "1px solid var(--line)",
        background: "linear-gradient(180deg, #131520 0%, #101117 100%)",
        flexShrink: 0, gap: "14px",
      }}>
        <LogoMark />
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: "10px" }}>
          <DeviceToggle device={device} onChange={setDevice} />
          <button
            className={canExport ? "btn btn-primary" : "btn"}
            onClick={() => canExport && setShowExport(true)}
            disabled={!canExport}
          >
            <Icon.download s={12} />
            Export {canExport ? `(${activeVar.factors.length})` : ""}
          </button>
        </div>
      </div>

      {/* Main split */}
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>

        {/* LEFT PANEL */}
        <div style={{
          width: "400px", flexShrink: 0,
          borderRight: "1px solid var(--line)",
          display: "flex", flexDirection: "column",
          background: "var(--ink-2)",
        }}>
          {/* Import */}
          <div style={{ padding: "12px 14px", borderBottom: "1px solid var(--line)" }}>
            <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".html,.htm" style={{ display: "none" }} />
            <button
              onClick={() => fileInputRef.current?.click()}
              style={{
                width: "100%", padding: "9px 12px",
                background: htmlSource ? "rgba(122, 224, 184, 0.06)" : "var(--ink-3)",
                border: `1px dashed ${htmlSource ? "rgba(122, 224, 184, 0.3)" : "var(--line)"}`,
                borderRadius: "8px",
                color: htmlSource ? "var(--mint)" : "var(--text-soft)",
                cursor: "pointer", fontSize: "12px",
                display: "flex", alignItems: "center", justifyContent: "center", gap: "7px",
                fontFamily: "inherit", transition: "all 0.15s",
              }}
            >
              <Icon.upload />
              {htmlSource ? "✓ Page loaded — import another" : "Import page source (.html)"}
            </button>
            {!htmlSource && (
              <button
                onClick={loadDemoPage}
                style={{
                  width: "100%", marginTop: "6px", padding: "6px",
                  background: "transparent", border: "none",
                  color: "var(--text-mute)", fontSize: "11px",
                  cursor: "pointer", fontFamily: "inherit",
                  textDecoration: "underline", textUnderlineOffset: "3px",
                  textDecorationColor: "var(--line)",

              >
                or try the demo page
              </button>
            )}
          </div>

          {/* Active variation indicator */}
          <div style={{
            padding: "9px 14px",
            borderBottom: "1px solid var(--line)",
            display: "flex", alignItems: "center", gap: "8px",
            background: "var(--ink)",
          }}>
            <div style={{
              width: "8px", height: "8px", borderRadius: "50%",
              background: activeVarColor, flexShrink: 0,
              boxShadow: `0 0 0 3px ${activeVarColor}22`,

            <span style={{ fontSize: "12px", fontWeight: 500, color: "var(--text)" }}>{activeVar.name}</span>
            {activeVar.isControl
              ? <span style={{ fontSize: "11px", color: "var(--text-mute)" }}>— original page, no changes</span>
              : <span style={{ fontSize: "11px", color: "var(--text-soft)" }}>
                  — {activeVar.factors.length} factor{activeVar.factors.length !== 1 ? "s" : ""}
                </span>
            }
          </div>

          {/* Chat */}
          <div style={{
            flex: 1, overflowY: "auto",
            padding: "14px",
            display: "flex", flexDirection: "column", gap: "8px",
          }}>
            {activeVar.messages.filter((m) => m.role !== "assistant_raw").length === 0 && (
              <div style={{ textAlign: "center", padding: "36px 18px" }}>
                <div className="serif" style={{
                  fontSize: "28px", fontStyle: "italic",
                  color: "var(--text-soft)", marginBottom: "10px",
                  lineHeight: 1.1,
                }}>
                  {activeVar.isControl ? "The original" : "What shall we test?"}
                </div>
                <div style={{ fontSize: "12px", color: "var(--text-mute)", lineHeight: 1.8 }}>
                  {activeVar.isControl
                    ? <>This is the control page.<br />Switch to a variation tab to describe changes.</>
                    : <>Describe a design change in plain English.<br />Each request becomes one or more SiteSpect factors.</>
                  }
                </div>
                {!activeVar.isControl && htmlSource && (
                  <div style={{ marginTop: "16px", display: "flex", flexDirection: "column", gap: "5px" }}>
                    {[
                      "Make the hero CTA coral and larger",
                      "Add urgency banner above the fold",
                      "Change product prices to bold red",
                    ].map((ex, i) => (
                      <button key={i} onClick={() => setPromptText(ex)} style={{
                        background: "var(--ink-3)",
                        border: "1px solid var(--line)",
                        borderRadius: "6px",
                        padding: "6px 10px",
                        fontSize: "11px",
                        color: "var(--text-soft)",
                        cursor: "pointer",
                        textAlign: "left",
                        fontFamily: "inherit",
                      }}>
                        <span style={{ color: "var(--coral)", marginRight: "5px" }}>→</span>
                        {ex}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}
            {activeVar.messages.filter((m) => m.role !== "assistant_raw").map((msg, i) => (
              <div key={i} className="fade-in" style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start" }}>
                <div style={{
                  maxWidth: "88%",
                  padding: "9px 12px", borderRadius: "10px",
                  fontSize: "12.5px", lineHeight: 1.55,
                  background:
                    msg.role === "user" ? "var(--coral)"
                    : msg.role === "system" ? "var(--ink-3)"
                    : "var(--ink-3)",
                  color:
                    msg.role === "user" ? "#1a0a05"
                    : msg.role === "system" ? "var(--text-soft)"
                    : "var(--text)",
                  border: msg.role === "assistant" ? "1px solid var(--line)" : "none",
                  fontWeight: msg.role === "user" ? 500 : 400,
                }}>
                  {msg.text}
                  {msg.role === "assistant" && msg.factorCount > 0 && (
                    <div style={{
                      marginTop: "5px", paddingTop: "5px",
                      borderTop: "1px solid var(--line)",
                      fontSize: "10.5px", color: "var(--coral)", fontWeight: 500,
                    }}>
                      ↓ {msg.factorCount} factor{msg.factorCount !== 1 ? "s" : ""} added
                    </div>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{ display: "flex" }}>
                <div className="loading-dot" style={{
                  padding: "9px 12px", borderRadius: "10px",
                  background: "var(--ink-3)", border: "1px solid var(--line)",
                  fontSize: "12px", color: "var(--text-soft)",
                }}>Analyzing the page<span style={{ color: "var(--coral)" }}>…</span></div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          {/* Factors */}
          {activeVar.factors.length > 0 && (
            <div style={{
              padding: "11px 14px", borderTop: "1px solid var(--line)",
              maxHeight: "260px", overflowY: "auto",
            }}>
              <div className="label-eyebrow" style={{ marginBottom: "8px" }}>
                SiteSpect Factors <span style={{ color: "var(--coral)" }}>· {activeVar.factors.length}</span>
              </div>
              {activeVar.factors.map((f) => (
                <FactorCard
                  key={f.id}
                  factor={f}
                  onRemove={(id) => updateVar(activeVarId, (v) => ({ factors: v.factors.filter((x) => x.id !== id) }))}
                />
              ))}
            </div>
          )}

          {/* Prompt input */}
          <div style={{ padding: "12px 14px", borderTop: "1px solid var(--line)", background: "var(--ink)" }}>
            <div className="label-eyebrow" style={{ marginBottom: "7px" }}>Design Change Prompt</div>
            <textarea
              value={promptText}
              onChange={(e) => setPromptText(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) handlePrompt(); }}
              disabled={activeVar.isControl}
              placeholder={activeVar.isControl ? "Select a variation tab to prompt changes…" : "e.g., Make the CTA button coral and larger, add a countdown timer…"}
              style={{
                width: "100%", minHeight: "74px",
                background: "var(--ink-2)",
                border: "1px solid var(--line)", borderRadius: "8px",
                color: activeVar.isControl ? "var(--text-faint)" : "var(--text)",
                fontSize: "12.5px", padding: "10px 12px",
                resize: "vertical", outline: "none", boxSizing: "border-box",
                lineHeight: 1.6,
                cursor: activeVar.isControl ? "not-allowed" : "text",
                transition: "border-color 0.15s, box-shadow 0.15s",
              }}
            />
            <button
              className="btn btn-primary"
              onClick={handlePrompt}
              disabled={loading || !promptText.trim() || activeVar.isControl}
              style={{ width: "100%", marginTop: "7px", padding: "10px", fontSize: "13px" }}
            >
              <Icon.arrow />
              {loading ? "Applying…" : "Apply changes"}
            </button>
            <div className="mono" style={{
              fontSize: "10px", color: "var(--text-faint)", textAlign: "center",
              marginTop: "5px", letterSpacing: "0.05em",
            }}>⌘ + Enter to submit</div>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

          {/* Variation tab bar */}
          <VariationTabBar
            variations={variations}
            activeId={activeVarId}
            onSelect={(id) => { setActiveVarId(id); setPreviewKey((k) => k + 1); }}
            onAdd={addVariation}
            onRename={(id, name) => setVariations((prev) => prev.map((v) => v.id === id ? { ...v, name } : v))}
            onDelete={(id) => { setVariations((prev) => prev.filter((v) => v.id !== id)); if (activeVarId === id) setActiveVarId("control"); }}
          />

          {/* Preview */}
          <div style={{
            flex: 1,
            background: "radial-gradient(ellipse at top, #131520 0%, #07080c 80%)",
            display: "flex", alignItems: "flex-start", justifyContent: "center",
            overflow: "auto", padding: "22px",
          }}>
            {htmlSource ? (
              <div style={{
                width: device === "mobile" ? "375px" : "100%",
                maxWidth: device === "mobile" ? "375px" : "1000px",
                minHeight: "100%",
                boxShadow: `
                  0 0 0 1px ${activeVarColor}44,
                  0 24px 64px rgba(0, 0, 0, 0.55),
                  0 0 80px ${activeVarColor}15
                `,
                borderRadius: device === "mobile" ? "20px" : "10px",
                overflow: "hidden",
                transition: "width 0.3s ease, max-width 0.3s ease",
                background: "#fff",
              }}>
                {/* Variation badge */}
                <div style={{
                  background: activeVar.isControl
                    ? "linear-gradient(90deg, #1f2937, #374151)"
                    : `linear-gradient(90deg, ${activeVarColor}, ${activeVarColor}cc)`,
                  color: "#fff", fontSize: "10px", fontWeight: 600, letterSpacing: "0.1em",
                  padding: "6px 12px", display: "flex", alignItems: "center", gap: "7px",
                  textTransform: "uppercase",
                }}>
                  <div style={{
                    width: "6px", height: "6px", borderRadius: "50%",
                    background: "rgba(255,255,255,0.85)",
                  }} />
                  {activeVar.name}
                  <span style={{ opacity: 0.75, marginLeft: "4px" }}>
                    {activeVar.isControl
                      ? "— original (no changes)"
                      : `— ${activeVar.factors.length} factor${activeVar.factors.length !== 1 ? "s" : ""} applied`
                    }
                  </span>
                </div>
                <iframe
                  key={`${previewKey}-${activeVarId}`}
                  ref={iframeRef}
                  srcDoc={htmlSource}
                  style={{
                    width: "100%",
                    height: device === "mobile" ? "640px" : "600px",
                    border: "none", display: "block",
                  }}
                  title="Page Preview"
                  sandbox="allow-scripts allow-same-origin"
                />
              </div>
            ) : (
              <div style={{
                display: "flex", flexDirection: "column",
                alignItems: "center", justifyContent: "center",
                height: "100%", gap: "16px", textAlign: "center",
              }}>
                <div style={{
                  width: "72px", height: "72px",
                  border: "1px dashed var(--line)", borderRadius: "14px",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  color: "var(--text-faint)",
                }}>
                  <Icon.frame s={28} />
                </div>
                <div>
                  <div className="serif" style={{
                    fontSize: "24px", fontStyle: "italic",
                    color: "var(--text-soft)", marginBottom: "6px",
                  }}>
                    Import a page to begin
                  </div>
                  <div style={{ fontSize: "12px", color: "var(--text-mute)", lineHeight: 1.8 }}>
                    Upload any <code className="mono" style={{ color: "var(--coral)" }}>.html</code> file — or try the demo page.
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Code viewer */}
          <div style={{ borderTop: "1px solid var(--line)", flexShrink: 0, background: "var(--ink-2)" }}>
            <div style={{ display: "flex", borderBottom: "1px solid var(--line)" }}>
              {[
                { id: "html", label: "HTML", count: null },
                { id: "css", label: "CSS", count: activeVar.factors.filter((f) => f.type === "css").length },
                { id: "js", label: "JS / HTML", count: activeVar.factors.filter((f) => f.type !== "css").length },
              ].map((t) => {
                const active = activeCodeTab === t.id;
                return (
                  <button key={t.id} onClick={() => setActiveCodeTab(t.id)} style={{
                    padding: "9px 18px", border: "none", cursor: "pointer",
                    background: active ? "var(--ink)" : "transparent",
                    color: active ? "var(--coral)" : "var(--text-mute)",
                    fontSize: "11px", fontWeight: 500,
                    borderBottom: active ? "2px solid var(--coral)" : "2px solid transparent",
                    marginBottom: "-1px",
                    display: "flex", alignItems: "center", gap: "6px",
                    fontFamily: "var(--font-mono)", letterSpacing: "0.03em",
                  }}>
                    {t.label}
                    {t.count > 0 && (
                      <span style={{
                        background: active ? "var(--coral)" : "var(--ink-4)",
                        color: active ? "#1a0a05" : "var(--text-mute)",
                        fontSize: "9px", padding: "1px 5px", borderRadius: "3px",
                        fontWeight: 600,
                      }}>{t.count}</span>
                    )}
                  </button>
                );
              })}
            </div>
            <pre className="mono" style={{
              margin: 0, padding: "12px 16px",
              background: "var(--ink)",
              color: "var(--text-soft)",
              fontSize: "11px", lineHeight: 1.75,
              height: "140px", overflow: "auto",
              whiteSpace: "pre-wrap", wordBreak: "break-word",
            }}>
              {codeContent}
            </pre>
          </div>
        </div>
      </div>

      {showExport && <ExportModal variation={activeVar} onClose={() => setShowExport(false)} />}
    </div>
  );
}

/* ─── Mount ─── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ABTestBuilder />);
</script>

</body>
</html>
